*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ✅ NEW COLOR SYSTEM */
:root {
  --bg: #FDF9F6;
  --bg2: #DBB8AA;
  --primary: #416285;
  --accent: #8BC6CA;
  --highlight: #EFCD52;

  --text: #416285;
  --muted: #8BC6CA;
  --line: rgba(65,98,133,0.15);
}

body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}

nav {
  padding: 20px;
